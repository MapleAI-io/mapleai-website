<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .success-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 28px;
      text-align: center;
    }
    .success-icon {
      width: 72px;
      height: 72px;
      background: var(--accent-low);
      border: 2px solid var(--accent-mid);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .success-icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--accent);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .success-label {
      font-family: var(--font-b);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .success-wrap h1 {
      font-family: var(--font-d);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 20px;
    }
    .success-wrap h1 em {
      font-style: italic;
      color: var(--accent);
    }
    .success-wrap p {
      font-size: 1.05rem;
      color: var(--text-2);
      max-width: 480px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }
    .success-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .success-divider {
      width: 48px;
      height: 3px;
      background: var(--accent);
      border-radius: 99px;
      margin: 0 auto 28px;
      opacity: 0.35;
    }
  </style>

<div class="success-wrap">
  <div class="success-icon">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="success-label">Message received</div>
  <h1>We'll be in touch <em>shortly.</em></h1>
  <div class="success-divider"></div>
  <p>Thanks for reaching out. We typically respond within one business day. In the meantime, feel free to explore what we do.</p>
  <div class="success-actions">
    <a href="/" class="btn btn-primary">
